name: weekly-visibility-snapshot

on:
  schedule:
    - cron: '0 0 * * 1' # 매주 월 00:00 UTC(월 09:00 KST) — gate(ISO 짝수주)로 격주만 실행
  workflow_dispatch: {} # 수동 실행(첫 검증·재측정) — gate 무시하고 항상 실행

permissions:
  contents: write # 스냅샷 커밋

jobs:
  # 격주 게이트 — 스케줄(매주 cron) 중 ISO 짝수주만 통과. 수동 dispatch 는 항상 통과.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.g.outputs.run }}
    steps:
      - id: g
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; echo "수동 실행 — 게이트 통과"; exit 0
          fi
          WK=$(date -u +%V) # ISO 주차 01-53
          if [ $((10#$WK % 2)) -eq 0 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; echo "ISO주차 $WK(짝수) — 실행"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"; echo "ISO주차 $WK(홀수) — 스킵(격주)"
          fi

  snapshot:
    needs: gate
    if: ${{ needs.gate.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm # pnpm-lock.yaml 커밋됨 → 캐시 활성
      - run: pnpm install --frozen-lockfile
      - name: 측정 시각 계산 (런타임 — repository.updated_at 은 직전 push 시각이라 부정확)
        id: ts
        run: echo "captured_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: 측정 실행 → snapshots/<app>/<isoWeek>/ + index.json
        run: pnpm snapshot
        env:
          CAPTURED_AT: ${{ steps.ts.outputs.captured_at }} # 런타임 UTC(src의 argless new Date 금지와 무관)
          # 점진적 활성화 — repo Variable 로 관리(미설정 시 아래 폴백). chatgpt+gemini(챗봇) + SerpApi(free) SERP
          ACTIVE_ENGINES: ${{ vars.ACTIVE_ENGINES || 'chatgpt,gemini,google-aio,naver-briefing' }}
          ACTIVE_SERVICES: ${{ vars.ACTIVE_SERVICES }} # 미설정이면 전 서비스
          # 안전장치(Variable 로 제어). 첫 dispatch 는 DRY_RUN=1 또는 SAMPLE_N 권장.
          DRY_RUN: ${{ vars.DRY_RUN }} # '1' 이면 실호출 없이 계획만
          SAMPLE_N: ${{ vars.SAMPLE_N }} # 엔진별 콜 수 제한
          MAX_USD: ${{ vars.MAX_USD }} # 누적 비용 상한(USD)
          MIN_SUCCESS_RATE: ${{ vars.MIN_SUCCESS_RATE }} # 성공률 미만이면 non-zero exit(기본 0.7)
          CLASSIFIER_MODEL: ${{ vars.CLASSIFIER_MODEL }} # 미설정이면 gpt-4.1-mini
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      - name: 스냅샷 커밋(동시 push 경합 대비 rebase 재시도)
        run: |
          git config user.name "geo-bot"
          git config user.email "geo-bot@users.noreply.github.com"
          git add snapshots/
          if git diff --cached --quiet; then echo "변경 없음"; exit 0; fi
          git commit -m "chore(snapshot): weekly ${{ github.run_number }}"
          for i in $(seq 1 5); do
            git pull --rebase --autostash origin main || { echo "rebase 실패, 재시도 $i/5"; sleep 5; continue; }
            pnpm rollup                 # 머지된 트리 기준으로 index.json 재생성(동시 geoScore 반영)
            git add snapshots/
            git commit --amend --no-edit
            git push && { echo "push 성공"; exit 0; }
            echo "push 경합, 재시도 $i/5"; sleep 5
          done
          echo "push 실패(재시도 소진)"; exit 1

  # 실패 알림 — 성공 시에만 Slack 이 울리는 구조라, 격주 cron 이 조용히 죽으면 다음 주기까지 결측을 모른다.
  # SLACK_ALERT_CHANNEL(Variable) 미설정이면 스킵(기존 notify:slack 과 동일한 무설정-무해 원칙).
  alert-failure:
    needs: [snapshot]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Slack 실패 알림
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ALERT_CHANNEL: ${{ vars.SLACK_ALERT_CHANNEL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ] || [ -z "$SLACK_ALERT_CHANNEL" ]; then
            echo "SLACK_BOT_TOKEN/SLACK_ALERT_CHANNEL 미설정 — 알림 스킵"; exit 0
          fi
          TEXT="$(printf ':rotating_light: *weekly-visibility-snapshot 실패* — 이번 회차 스냅샷이 기록되지 않았습니다. 방치하면 시계열에 한 주기(2주) 결측이 생깁니다.\n<%s|실패한 런 보기> → 원인 해결 후 workflow_dispatch 로 재실행' "$RUN_URL")"
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-Type: application/json; charset=utf-8' \
            -d "$(jq -n --arg ch "$SLACK_ALERT_CHANNEL" --arg t "$TEXT" '{channel:$ch, text:$t}')" \
            | jq -e '.ok' || { echo "Slack 발송 실패(응답 ok=false)"; exit 1; }
