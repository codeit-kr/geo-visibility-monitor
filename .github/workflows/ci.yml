name: ci

on:
  push:
    branches: [main]
    paths-ignore: ['snapshots/**'] # 봇의 주간 데이터 커밋엔 CI 불필요
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      # 파이프라인 스모크 — DRY_RUN 은 실호출·크롤·기록 전부 생략(Secret 불필요, 비용 0).
      # "머지는 됐는데 다음 격주 런에서 터지는" 부류(질의셋 전개·서비스 설정·오케스트레이션 회귀)를 머지 전에 잡는다.
      - name: snapshot DRY_RUN 스모크
        run: DRY_RUN=1 CAPTURED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)" pnpm -s snapshot

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # build 가 타입체크까지 수행(next-env.d.ts 생성 후) + ../snapshots(커밋본) 읽어 정적 생성 검증
      - run: pnpm build
