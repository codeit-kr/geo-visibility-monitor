name: notify-test

# 측정/배포 없이 'Vercel 재배포 대기 + Slack 알림' 만 검증하는 수동 워크플로.
# 기본 채널은 #squad-kdt(테스트). 현재 main HEAD 커밋이 Vercel production READY 인지 확인 후 알림.
on:
  workflow_dispatch:
    inputs:
      channel:
        description: '테스트 Slack 채널 ID'
        default: 'C092AFD23RS' # #squad-kdt
        required: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Vercel 재배포 완료 대기(현재 커밋 READY)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Vercel 변수 미설정 — 대기 스킵"; exit 0
          fi
          SHA=$(git rev-parse HEAD)
          echo "대기 대상 커밋: $SHA"
          TEAM=""; [ -n "$VERCEL_TEAM_ID" ] && TEAM="&teamId=$VERCEL_TEAM_ID"
          for i in $(seq 1 40); do # 40 × 9s ≈ 6분
            RES=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=production&limit=20$TEAM")
            STATE=$(echo "$RES" | jq -r --arg sha "$SHA" '.deployments[] | select(.meta.githubCommitSha==$sha) | .readyState' | head -1)
            echo "[$i/40] readyState=${STATE:-(미발견)}"
            case "$STATE" in
              READY) echo "재배포 완료"; exit 0 ;;
              ERROR|CANCELED) echo "배포 실패/취소 — 알림은 진행"; exit 0 ;;
            esac
            sleep 9
          done
          echo "대기 타임아웃(~6분) — 알림 진행"; exit 0

      - name: Slack 알림(테스트 채널)
        run: pnpm -s notify:slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_OVERRIDE: ${{ inputs.channel }} # 코드의 채널 무시하고 이 채널로
          ACTIVE_SERVICES: ${{ vars.ACTIVE_SERVICES }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL || 'https://codeit-geo-visibility-monitor.vercel.app' }}
