name: weekly-geo-audit

# 그룹 C(GEO 점수). 에이전트형 geo-audit 스킬은 LLM 채점 변동이 커서, 동일 감사를 N회(3) 실행해
# 평균/range 로 집계(변동을 통계로 흡수). 주간 스냅샷(weekly-visibility-snapshot) 완료 후 체이닝.
on:
  workflow_run:
    workflows: ['weekly-visibility-snapshot']
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: write # geoScore.json 커밋
  id-token: write # claude-code-action GitHub 토큰 OIDC 교환용(github_token 제공 시 미사용)

jobs:
  # 0) 격주 게이트 — weekly-visibility-snapshot 과 동일 규칙(ISO 짝수주만). 홀수주엔 감사·집계·알림 전부 스킵.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.g.outputs.run }}
    steps:
      - id: g
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; echo "수동 실행 — 게이트 통과"; exit 0
          fi
          WK=$(date -u +%V) # ISO 주차 01-53
          if [ $((10#$WK % 2)) -eq 0 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; echo "ISO주차 $WK(짝수) — 실행"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"; echo "ISO주차 $WK(홀수) — 스킵(격주)"
          fi

  # 1) 동일 감사 3회 병렬 → 각 run 결과를 아티팩트로 보존.
  #    fail-fast:false + aggregate 가 성공분만 평균 → 일부 run 이 rate-limit(429)로 죽어도 비치명적.
  #    구독 동시호출이 자주 429 나면 max-parallel: 1 로 낮출 것.
  audit:
    needs: gate
    runs-on: ubuntu-latest
    if: ${{ needs.gate.outputs.run == 'true' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') }}
    strategy:
      fail-fast: false
      matrix:
        run: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: 감사 대상(audit-targets.json) 산출
        run: |
          CAPTURED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)" pnpm -s audit:targets > audit-targets.json
          cat audit-targets.json
        env:
          ACTIVE_SERVICES: ${{ vars.ACTIVE_SERVICES }}

      - name: geo-audit 스킬 설치(~/.claude/skills)
        run: |
          git clone --depth 1 https://github.com/zubair-trabzada/geo-seo-claude /tmp/geo-skill
          bash /tmp/geo-skill/install.sh

      - name: GEO 감사 (run ${{ matrix.run }}/3)
        uses: anthropics/claude-code-action@v1
        with:
          # Claude 구독 OAuth 토큰 인증(별도 종량제 키 불필요). 발급: `claude setup-token`.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 내장 토큰 명시 → GitHub 토큰을 OIDC 로 받지 않음(앱 미설치 환경).
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            `audit-targets.json` 을 읽어라. 배열의 각 항목
            {app, url, isoWeek, capturedAt, auditUrls, brandSources, brandSourcesVersion} 마다
            `/geo-audit {url}` 로 GEO 감사를 수행한다. 단 재현성을 위해 아래 제약을 반드시 지킨다.

            [고정 입력 — 재현성]
            - 감사 대상 페이지는 그 항목의 `auditUrls` 로 한정한다. 스킬이 sitemap 을 임의 크롤하거나 블로그를 랜덤 샘플하지 않게 한다(동일 입력 = 동일 점수).
            - 기술 신호는 robots.txt / sitemap.xml / server-sitemap.xml / llms.txt / llms-full.txt(존재여부)만 점검.
            - 각 카테고리 점수는 주관 인상이 아니라 객관 신호 체크리스트의 가점 합으로 산정하고, 항목별 근거를 리포트에 남긴다.

            [KR 현지화]
            - 한국 시장 서비스다. 엔티티 그라운딩·평판·플랫폼은 한국 생태계 기준으로 평가한다.
            - 영문 Wikipedia·Reddit·G2·Trustpilot·Clutch 부재는 critical 로 분류하지 말고 가중치를 낮춘다(Wikidata 는 언어무관 핵심이라 유지).

            [브랜드/플랫폼 채점]
            - composite 에 반영하는 외부 신호는 그 항목의 `brandSources` 고정 체크리스트뿐이다. 각 소스의 존재/연결 여부로 채점.
            - `brandSources` 항목에 "(모회사)" 표기가 있으면 코드잇(parent) 엔티티다(sprint 전용 아님). 사이트 Organization 스키마가
              `parentOrganization` 으로 코드잇(www.codeit.kr)에 연결돼 있고 그 모회사 엔티티가 존재하면 **부분 가점**한다(자식이 부모 엔티티 상속).
              나무위키가 직접 fetch 시 403 이어도, 코드잇 sameAs 링크·parentOrganization 연결로 확인되면 인정(직접 fetch 불필요). 완전 가점은 sprint 전용 엔티티가 있을 때만.
            - 그 외 새로 발견한 소스·커뮤니티(OKKY·블라인드·커리어리·네이버 카페 등)는 리포트의 "디스커버리" 섹션에만 기록하고 composite 점수엔 넣지 않는다.

            [산출물 — 반드시 실제 Write, 부모 디렉터리 자동 생성]
            1) `snapshots/{app}/{isoWeek}/geoScore.json` (정수 0–100, composite = 가중식 citability0.25 + brand0.20 + eeat0.20 + technical0.15 + schema0.10 + platform0.10 반올림):
               {
                 "schemaVersion": 1, "capturedAt": "<capturedAt>", "isoWeek": "<isoWeek>", "app": "<app>",
                 "composite": <int>, "citability": <int>, "brand": <int>, "eeat": <int>,
                 "technical": <int>, "schema": <int>, "platform": <int>
               }
            2) `snapshots/{app}/{isoWeek}/geo-audit-report.md` — 카테고리별 체크리스트 근거 + "디스커버리" 섹션 + 사용한 brandSourcesVersion 명시.
            끝나면 기록한 파일 경로를 요약하라.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 150
            --allowedTools "Read,Write,Bash,WebFetch,Task,Glob,Grep"

      # 루트 평면 파일로(app 인코딩) — upload-artifact 의 공통경로 스트립 회피.
      - name: run 결과 루트로 추출(georun-<app>-run${{ matrix.run }})
        run: |
          for f in snapshots/*/*/geoScore.json; do
            [ -e "$f" ] || continue
            app=$(echo "$f" | cut -d/ -f2)
            mv "$f" "georun-${app}-run${{ matrix.run }}.json"
          done
          for f in snapshots/*/*/geo-audit-report.md; do
            [ -e "$f" ] || continue
            app=$(echo "$f" | cut -d/ -f2)
            mv "$f" "georeport-${app}-run${{ matrix.run }}.md"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: geo-run-${{ matrix.run }}
          path: |
            georun-*-run${{ matrix.run }}.json
            georeport-*-run${{ matrix.run }}.md
          if-no-files-found: warn

  # 2) 3회 집계(평균/range) → 롤업 → 커밋.
  aggregate:
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: run 아티팩트 복원(snapshots/ 로)
        uses: actions/download-artifact@v4
        with:
          pattern: geo-run-*
          merge-multiple: true
          path: .

      - name: 집계(평균/range) + 롤업
        run: |
          ls georun-*-run*.json georeport-*-run*.md 2>/dev/null || echo "(수합된 run 파일 확인)"
          pnpm -s geo:aggregate
          pnpm rollup

      - name: 커밋(동시 push 경합 대비 rebase 재시도)
        run: |
          git config user.name "geo-bot"
          git config user.email "geo-bot@users.noreply.github.com"
          git add snapshots/
          if git diff --cached --quiet; then echo "변경 없음"; exit 0; fi
          git commit -m "chore(geo-audit): weekly ${{ github.run_number }} (3-run 평균)"
          for i in $(seq 1 5); do
            git pull --rebase --autostash origin main || { echo "rebase 실패, 재시도 $i/5"; sleep 5; continue; }
            pnpm rollup
            git add snapshots/
            git commit --amend --no-edit
            git push && { echo "push 성공"; exit 0; }
            echo "push 경합, 재시도 $i/5"; sleep 5
          done
          echo "push 실패(재시도 소진)"; exit 1

      # 알림 링크가 404 안 나도록, 방금 push 한 커밋이 Vercel production 에 READY 될 때까지 대기.
      # 토큰/프로젝트 미설정이거나 타임아웃이면 그냥 진행(알림을 막지 않음).
      - name: Vercel 재배포 완료 대기(해당 커밋 READY)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }} # 팀/조직 프로젝트면 필요
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Vercel 변수 미설정 — 대기 스킵"; exit 0
          fi
          SHA=$(git rev-parse HEAD)
          echo "대기 대상 커밋: $SHA"
          TEAM=""; [ -n "$VERCEL_TEAM_ID" ] && TEAM="&teamId=$VERCEL_TEAM_ID"
          for i in $(seq 1 40); do # 40 × 9s ≈ 6분
            RES=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=production&limit=20$TEAM")
            STATE=$(echo "$RES" | jq -r --arg sha "$SHA" '.deployments[] | select(.meta.githubCommitSha==$sha) | .readyState' | head -1)
            echo "[$i/40] readyState=${STATE:-(미발견)}"
            case "$STATE" in
              READY) echo "재배포 완료"; exit 0 ;;
              ERROR|CANCELED) echo "배포 실패/취소 — 알림은 진행"; exit 0 ;;
            esac
            sleep 9
          done
          echo "대기 타임아웃(~6분) — 알림 진행"; exit 0

      - name: Slack 알림(서비스별 채널 — visibility+GEO 요약)
        run: pnpm -s notify:slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }} # 봇 토큰(chat:write). 미설정이면 스크립트가 스킵.
          ACTIVE_SERVICES: ${{ vars.ACTIVE_SERVICES }} # 측정 대상과 동일 게이트
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL || 'https://codeit-geo-visibility-monitor.vercel.app' }}
