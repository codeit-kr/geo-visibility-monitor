name: weekly-geo-audit

# 그룹 C(GEO 점수). geo-audit 은 에이전트형 스킬(5 서브에이전트)이라 일반 node cron 불가 →
# Claude Code Action 으로 헤드리스 실행. 주간 스냅샷(weekly-visibility-snapshot) 완료 후 체이닝.
on:
  workflow_run:
    workflows: ['weekly-visibility-snapshot']
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: write # geoScore.json 커밋
  id-token: write # claude-code-action 의 GitHub 토큰 OIDC 교환용(github_token 제공 시 미사용이나 안전상)

jobs:
  geo-audit:
    runs-on: ubuntu-latest
    # 주간 스냅샷이 성공했을 때만(수동 dispatch 는 항상).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: 측정 시각 + 감사 대상(audit-targets.json) 산출
        run: |
          CAPTURED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          CAPTURED_AT="$CAPTURED_AT" pnpm -s audit:targets > audit-targets.json
          echo "대상:"; cat audit-targets.json
        env:
          ACTIVE_SERVICES: ${{ vars.ACTIVE_SERVICES }}

      - name: geo-audit 스킬 설치(~/.claude/skills)
        run: |
          git clone --depth 1 https://github.com/zubair-trabzada/geo-seo-claude /tmp/geo-skill
          bash /tmp/geo-skill/install.sh

      - name: GEO 감사 실행 — 서비스별 /geo-audit → geoScore.json
        uses: anthropics/claude-code-action@v1
        with:
          # Claude 구독(Pro/Max) OAuth 토큰으로 인증 — 별도 종량제 API 키 불필요.
          #   발급: 로컬에서 `claude setup-token` → 출력 토큰을 Secret CLAUDE_CODE_OAUTH_TOKEN 으로 등록.
          #   (대안: anthropic_api_key 로 종량제 키 사용 가능)
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 내장 토큰 명시 → 액션이 GitHub 토큰을 OIDC(Claude GitHub App)로 받지 않음(앱 미설치 환경).
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            `audit-targets.json` 을 읽어라. 배열의 각 항목
            {app, url, isoWeek, capturedAt, auditUrls, brandSources, brandSourcesVersion} 마다
            `/geo-audit {url}` 로 GEO 감사를 수행한다. 단 재현성을 위해 아래 제약을 반드시 지킨다.

            [고정 입력 — 재현성]
            - 감사 대상 페이지는 그 항목의 `auditUrls` 로 한정한다. 스킬이 sitemap 을 임의 크롤하거나 블로그를 랜덤 샘플하지 않게 한다(동일 입력 = 동일 점수).
            - 기술 신호는 robots.txt / sitemap.xml / server-sitemap.xml / llms.txt / llms-full.txt(존재여부)만 점검.
            - 각 카테고리 점수는 주관 인상이 아니라 객관 신호 체크리스트의 가점 합으로 산정하고, 항목별 근거를 리포트에 남긴다.

            [KR 현지화]
            - 한국 시장 서비스다. 엔티티 그라운딩·평판·플랫폼은 한국 생태계 기준으로 평가한다.
            - 영문 Wikipedia·Reddit·G2·Trustpilot·Clutch 부재는 critical 로 분류하지 말고 가중치를 낮춘다(Wikidata 는 언어무관 핵심이라 유지).

            [브랜드/플랫폼 채점]
            - composite 에 반영하는 외부 신호는 그 항목의 `brandSources` 고정 체크리스트뿐이다. 각 소스의 존재/연결 여부로 채점.
            - `brandSources` 항목에 "(모회사)" 표기가 있으면 코드잇(parent) 엔티티다(sprint 전용 아님). 사이트 Organization 스키마가
              `parentOrganization` 으로 코드잇(www.codeit.kr)에 연결돼 있고 그 모회사 엔티티가 존재하면 **부분 가점**한다(자식이 부모 엔티티 상속).
              나무위키가 직접 fetch 시 403 이어도, 코드잇 sameAs 링크·parentOrganization 연결로 확인되면 인정(직접 fetch 불필요). 완전 가점은 sprint 전용 엔티티가 있을 때만.
            - 그 외 새로 발견한 소스·커뮤니티(OKKY·블라인드·커리어리·네이버 카페 등)는 리포트의 "디스커버리" 섹션에만 기록하고 composite 점수엔 넣지 않는다.

            [산출물 — 반드시 실제 Write, 부모 디렉터리 자동 생성]
            1) `snapshots/{app}/{isoWeek}/geoScore.json` (정수 0–100, composite = 가중식 citability0.25 + brand0.20 + eeat0.20 + technical0.15 + schema0.10 + platform0.10 반올림):
               {
                 "schemaVersion": 1, "capturedAt": "<capturedAt>", "isoWeek": "<isoWeek>", "app": "<app>",
                 "composite": <int>, "citability": <int>, "brand": <int>, "eeat": <int>,
                 "technical": <int>, "schema": <int>, "platform": <int>
               }
            2) `snapshots/{app}/{isoWeek}/geo-audit-report.md` — 카테고리별 체크리스트 근거 + "디스커버리" 섹션 + 사용한 brandSourcesVersion 명시.
            끝나면 기록한 파일 경로를 요약하라.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 150
            --allowedTools "Read,Write,Bash,WebFetch,Task,Glob,Grep"

      - name: 롤업 + 커밋 + 푸시(동시 push 경합 대비 rebase 재시도)
        run: |
          rm -f audit-targets.json
          git config user.name "geo-bot"
          git config user.email "geo-bot@users.noreply.github.com"
          git add snapshots/
          if git diff --cached --quiet; then echo "변경 없음"; exit 0; fi
          git commit -m "chore(geo-audit): weekly ${{ github.run_number }}"
          for i in $(seq 1 5); do
            git pull --rebase --autostash origin main || { echo "rebase 실패, 재시도 $i/5"; sleep 5; continue; }
            pnpm rollup                 # 머지된 트리 기준으로 index.json 재생성
            git add snapshots/
            git commit --amend --no-edit
            git push && { echo "push 성공"; exit 0; }
            echo "push 경합, 재시도 $i/5"; sleep 5
          done
          echo "push 실패(재시도 소진)"; exit 1
